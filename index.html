<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/common.css" />
    <link rel="stylesheet" href="./styles/nav.css" />
    <link rel="stylesheet" href="./styles/main.css" />
    <title>Wordle</title>
  </head>

  <body>
    <nav>
      <h1 class="nav__wordle">WORDLE</h1>
    </nav>

    <main>
      <section class="main__board">
        <section class="main__board--row" id="r1">
          <input
            type="text"
            maxlength="5"
            spellcheck="false"
            class="main__board--row--input"
            id="r1Input"
          />
          <div class="main__board--row--tile" id="r1t1"></div>
          <div class="main__board--row--tile" id="r1t2"></div>
          <div class="main__board--row--tile" id="r1t3"></div>
          <div class="main__board--row--tile" id="r1t4"></div>
          <div class="main__board--row--tile" id="r1t5"></div>
        </section>

          <div class="main__board--row--tile" id="r3t4"></div>
          <div class="main__board--row--tile" id="r3t5"></div>
        </section>

        <section class="main__board--row" id="r4">
          <input
            type="text"
            maxlength="5"
            spellcheck="false"
            class="main__board--row--input"
            id="r4Input"
          />
          <div class="main__board--row--tile" id="r4t1"></div>

        </section>

        <section class="main__board--row" id="r6">
          <input
            type="text"
            maxlength="5"

        </section>
      </section>

      <section class="keyboard">
        <div class="key-row">
          <button class="key">Q</button>
          <button class="key">W</button>
          <button class="key">E</button>
          <button class="key">R</button>
          <button class="key">T</button>
          <button class="key">Y</button>
          <button class="key">U</button>
          <button class="key">I</button>
          <button class="key">O</button>
          <button class="key">P</button>
        </div>
        <div class="key-row">
          <button class="key">A</button>
          <button class="key">S</button>
          <button class="key">D</button>
          <button class="key">F</button>
          <button class="key">G</button>
          <button class="key">H</button>
          <button class="key">J</button>
          <button class="key">K</button>
          <button class="key">L</button>
        </div>
        <div class="key-row">
          <button class="key enter">Enter</button>
          <button class="key">Z</button>
          <button class="key">X</button>
          <button class="key">C</button>
          <button class="key">V</button>
          <button class="key">B</button>
          <button class="key">N</button>
          <button class="key">M</button>
          <button class="key back">⌫</button>
        </div>
      </section>

      <section class="main__alertbox">
        <h1 class="main__alertbox--text"></h1>
      </section>
